<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap">
  <style>
    :root {
      --bg-color: #0b0d10;
      --card-bg: rgba(20, 24, 33, 0.75);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent-color: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --border-color: rgba(255, 255, 255, 0.06);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      line-height: 1.6;
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0, transparent 55%),
        radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.08) 0, transparent 55%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    
    header {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11, 13, 16, 0.75);
    }
    
    .header-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .site-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    
    .nav-links a:hover {
      color: var(--text-primary);
    }
    
    main {
      flex: 1;
      max-width: 1100px;
      width: calc(100% - 4rem);
      margin: 2.5rem auto;
      padding: 0 2rem;
    }
    
    footer {
      border-top: 1px solid var(--border-color);
      padding: 2.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: auto;
      background: rgba(8, 10, 12, 0.5);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <a href="{{ '/' | relative_url }}" class="site-logo">Friday Jazz Happy Hour</a>
      <nav class="nav-links">
        <a href="{{ '/' | relative_url }}">All Songs</a>
        <a href="{{ '/episodes.html' | relative_url }}">Episodes</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; {{ site.time | date: "%Y" }} Bill Walker. Generated with YouTube Chapter Analyzer.
  </footer>
</body>
</html>
